name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Node tests (Vitest, tier 1 — pure logic)
        run: pnpm run test:node

      - name: Build
        run: pnpm run build

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: Browser tests (Vitest, tier 2 — real GPU + R3F render)
        run: xvfb-run -a pnpm run test:browser

  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        # `test:e2e:ci` runs across chromium + android-pixel (chrome) +
        # ios-iphone (webkit) + ipad-landscape (webkit), so the install
        # needs both engines, not just chromium. `--with-deps` adds the
        # apt packages webkit needs on the ubuntu-latest runner.
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Smoke E2E (tier 3 — full flows)
        # Direct invocation rather than `pnpm run test:e2e:ci` because
        # the npm script is shell-conditional and won't forward extra
        # args. Append --reporter=github,html so the upload below
        # captures both inline annotations AND a downloadable html
        # report (the github reporter alone doesn't generate one).
        run: pnpm exec playwright test --grep-invert '@nightly|@governor|@axe|@pap' --reporter=github,html

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
