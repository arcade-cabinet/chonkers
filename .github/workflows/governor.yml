name: Governor

# Long-budget AI-vs-AI in-browser run. PRQ-B6 acceptance gate:
# 1000 matches finish (or ≤ 1% outliers), no console / page errors,
# no leaked SVG overlay nodes after each match's quitMatch().
#
# Triggers:
#   - schedule: weekly Sunday 08:00 UTC (so the freshest result is
#     available at the start of each week)
#   - workflow_dispatch: manual run with overridable run count
#     (default 1000, override with smaller for smoke checks)

on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:
    inputs:
      runs:
        description: "GOVERNOR_RUNS — number of AI-vs-AI matches to drive"
        required: false
        default: "1000"

permissions:
  contents: read

jobs:
  governor:
    # Serialize governor runs — 5h+ jobs that overlap (schedule firing
    # while a manual dispatch is mid-run, or two dispatches close in
    # time) waste runner minutes. `cancel-in-progress: false` keeps
    # the in-flight run going and queues the new one rather than
    # killing partial work.
    concurrency:
      group: governor-${{ github.workflow }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    # 6h ceiling on free-tier ubuntu-latest. At ~13s/match (smoke pace)
    # 1000 matches ≈ 3.6h with comfortable headroom for setup +
    # in-browser overhead. If this starts pushing 5h+ regularly, shard
    # via matrix.
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: 1000-run governor
        env:
          GOVERNOR_RUNS: ${{ github.event.inputs.runs || '1000' }}
          # playwright.config.ts uses the `"github"` reporter when
          # CI=true — good for inline annotations but produces no
          # `playwright-report/` artifact. The workflow appends an
          # html reporter so upload-artifact has something to package.
          # Calling `pnpm exec playwright test` directly (rather than
          # the test:e2e:governor script wrapper) is necessary because
          # the script is shell-conditional and doesn't forward args.
          PLAYWRIGHT_HTML_REPORT: playwright-report
        run: pnpm exec playwright test --grep @governor --reporter=github,html

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-governor-report
          path: playwright-report/
          if-no-files-found: ignore

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-governor-results
          path: test-results/
          if-no-files-found: ignore
