name: Governor

# PRQ-B6 acceptance gate, in two parts:
#   1. Node-tier `pnpm test:beta` — 1000 AI-vs-AI matches across 9
#      rotated disposition pairings; per-pairing 60/40 win-rate band
#      + ≤ 1% outlier rate. Pure TS, no DOM, ~5min runtime.
#   2. In-browser `pnpm exec playwright test --grep @governor` — 50
#      AI-vs-AI matches end-to-end through the visual stack; renders
#      survive a sustained session, no console errors, no leaks.
#      Render-survival, not balance.
#
# Triggers:
#   - schedule: weekly Sunday 08:00 UTC
#   - workflow_dispatch: manual run with overridable browser-tier
#     match count (default 50)

on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:
    inputs:
      browser_runs:
        description: "GOVERNOR_RUNS — in-browser match count (50 is the default render-survival check; bump for ad-hoc longer runs)"
        required: false
        default: "50"

permissions:
  contents: read

jobs:
  governor:
    # Serialize so a schedule firing while a manual dispatch is in
    # flight queues rather than races. cancel-in-progress: false
    # preserves any in-flight work.
    concurrency:
      group: governor-${{ github.workflow }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    # Node 1000-run ~5min + browser 50-run ~12min + setup ~2min ≈
    # 20min budget. 60 leaves headroom without wasting a 6h slot.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 1000-run beta gate (node-tier)
        # Pure TS, no DOM. Asserts per-pairing 60/40 + ≤ 1% outliers.
        # Writes the beta summary to `os.tmpdir()/chonkers-beta-summary.json`
        # — on ubuntu-latest that's `/tmp/chonkers-beta-summary.json`.
        # The test flushes the partial summary every ~20 matches so a
        # late-test failure or timeout still leaves an artifact.
        run: pnpm test:beta

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: chonkers-beta-summary
          path: /tmp/chonkers-beta-summary.json
          if-no-files-found: ignore

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: Render-survival governor (in-browser, 50 matches)
        env:
          GOVERNOR_RUNS: ${{ github.event.inputs.browser_runs || '50' }}
          PLAYWRIGHT_HTML_REPORT: playwright-report
        run: pnpm exec playwright test --grep @governor --reporter=github,html

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-governor-report
          path: playwright-report/
          if-no-files-found: ignore

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-governor-results
          path: test-results/
          if-no-files-found: ignore
